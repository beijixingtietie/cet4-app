name: cet4_app
description: 英语四级备考 APP（AI 增强版）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  path: ^1.8.3
  sqflite: ^2.3.0
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^26.1.35
  fl_chart: ^0.69.0
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/audio/
    - assets/pdf/

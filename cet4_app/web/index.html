<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cet4_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cet4_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // 错误捕获和加载状态显示
    window.addEventListener('error', function(e) {
      var el = document.getElementById('loading-status');
      if (el) el.innerHTML = '<div style="color:red;padding:20px;text-align:center"><h2>加载错误</h2><p>' + e.message + '</p><p>文件: ' + e.filename + ':' + e.lineno + '</p></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('loading-status');
      if (el) el.innerHTML = '<div style="color:red;padding:20px;text-align:center"><h2>Promise 错误</h2><p>' + (e.reason || '未知错误') + '</p></div>';
    });
  </script>
  <div id="loading-status" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:18px;color:#666">
    <div style="text-align:center">
      <div style="width:40px;height:40px;border:3px solid #ccc;border-top:3px solid #1976D2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      <div>CET4 备考助手加载中...</div>
      <div style="font-size:12px;color:#999;margin-top:8px">如果长时间未响应，请刷新页面</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
